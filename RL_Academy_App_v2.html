<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bundaberg SHS — RL Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--navy:#0D2137;--navy2:#122840;--gold:#C9A227;--gold2:#E8B930;--blue:#1B4F8A;--steel:#2E6DA4;--ltblue:#D6E4F2;--pale:#EBF3FB;--white:#FFFFFF;--off:#F8F9FA;--gray:#8896A7;--border:rgba(255,255,255,0.08);--green:#1A7A42;--ltgreen:#D4EDDA;--orange:#C05020;--ltorange:#FAEAEA;--purple:#5A2A7A;--ltpurple:#EDE0F3;--teal:#1A7A7A;--card:rgba(255,255,255,0.04);--radius:12px;--radius-sm:8px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;scroll-behavior:smooth;}
body{font-family:'Barlow',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--navy);}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:4px;}
#app{display:flex;flex-direction:column;min-height:100vh;}
.screen{display:none;flex-direction:column;min-height:100vh;}.screen.active{display:flex;}

/* LOGIN */
#login{justify-content:center;align-items:center;background:linear-gradient(160deg,#0a1a2e 0%,#0D2137 40%,#0f2d50 100%);position:relative;overflow:hidden;}
.login-bg{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 40% at 50% -10%,rgba(201,162,39,0.12) 0%,transparent 70%),radial-gradient(ellipse 40% 30% at 90% 80%,rgba(27,79,138,0.2) 0%,transparent 60%);}
.login-grid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:40px 40px;}
.login-box{position:relative;z-index:1;width:100%;max-width:420px;padding:0 24px;}
.login-logo{text-align:center;margin-bottom:32px;}
.login-logo-badge{display:inline-block;background:var(--gold);color:var(--navy);font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:11px;letter-spacing:3px;padding:6px 16px;border-radius:3px;margin-bottom:14px;}
.login-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:48px;line-height:0.95;color:var(--white);margin-bottom:6px;}
.login-title span{color:var(--gold);}
.login-sub{font-size:14px;color:var(--gray);}
.login-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius);padding:26px;backdrop-filter:blur(10px);}
.login-card h3{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;letter-spacing:1px;margin-bottom:18px;color:var(--gold);}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:11px;font-weight:600;letter-spacing:1.5px;color:var(--gray);margin-bottom:5px;text-transform:uppercase;}
.form-group input,.form-group select{width:100%;padding:11px 13px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius-sm);color:var(--white);font-family:'Barlow',sans-serif;font-size:15px;transition:border-color 0.2s;-webkit-appearance:none;}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--gold);background:rgba(255,255,255,0.08);}
.form-group select option{background:var(--navy);color:var(--white);}
.btn{display:block;width:100%;padding:13px;background:var(--gold);color:var(--navy);font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;letter-spacing:2px;border:none;border-radius:var(--radius-sm);cursor:pointer;transition:all 0.2s;text-transform:uppercase;}
.btn:hover{background:var(--gold2);transform:translateY(-1px);box-shadow:0 4px 20px rgba(201,162,39,0.3);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:2px solid var(--gold);color:var(--gold);}
.btn-outline:hover{background:rgba(201,162,39,0.1);transform:none;box-shadow:none;}
.btn-sm{display:inline-block;width:auto;padding:8px 16px;font-size:12px;letter-spacing:1.5px;}
.btn-ghost{background:rgba(255,255,255,0.06);color:var(--white);border:1px solid rgba(255,255,255,0.1);}
.btn-ghost:hover{background:rgba(255,255,255,0.1);}
.btn-green{background:var(--green);color:var(--white);}
.btn-green:hover{background:#1d8a4a;box-shadow:0 4px 20px rgba(26,122,66,0.3);}
.btn-red{background:var(--orange);color:var(--white);}
.btn-blue{background:var(--blue);color:var(--white);}
.login-switch{text-align:center;margin-top:14px;font-size:13px;color:var(--gray);}
.login-switch a{color:var(--gold);cursor:pointer;font-weight:600;}

/* MAIN LAYOUT */
#main{flex-direction:row;}
.sidebar{width:220px;flex-shrink:0;background:rgba(0,0,0,0.25);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
.sidebar-logo{padding:18px 18px 14px;border-bottom:1px solid var(--border);}
.sidebar-logo .badge{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:10px;letter-spacing:2px;color:var(--gold);background:rgba(201,162,39,0.15);padding:3px 8px;border-radius:3px;display:inline-block;margin-bottom:5px;}
.sidebar-logo h2{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;line-height:1.1;}
.sidebar-logo h2 span{color:var(--gold);}
.sidebar-nav{flex:1;padding:10px 0;overflow-y:auto;}
.nav-section{font-size:9px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,0.3);text-transform:uppercase;padding:10px 18px 3px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 18px;cursor:pointer;font-size:13px;font-weight:500;color:rgba(255,255,255,0.6);transition:all 0.15s;border-left:3px solid transparent;}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--white);}
.nav-item.active{background:rgba(201,162,39,0.08);color:var(--gold);border-left-color:var(--gold);}
.nav-item .icon{font-size:15px;flex-shrink:0;}
.sidebar-user{padding:13px 18px;border-top:1px solid var(--border);}
.sidebar-user .name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;}
.sidebar-user .pos{font-size:11px;color:var(--gray);}
.sidebar-user .logout{font-size:11px;color:var(--gray);cursor:pointer;margin-top:3px;}
.sidebar-user .logout:hover{color:var(--orange);}
.main-content{flex:1;overflow-y:auto;min-height:100vh;}
.mobile-header{display:none;background:var(--navy2);border-bottom:1px solid var(--border);padding:11px 16px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.mobile-header h2{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:19px;}
.mobile-header h2 span{color:var(--gold);}
.hamburger{font-size:21px;cursor:pointer;padding:4px;}
.mobile-menu{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);}
.mobile-menu.open{display:block;}
.mobile-menu-panel{position:absolute;top:0;left:0;bottom:0;width:260px;background:#0a1e32;padding:20px 0;animation:slideIn 0.25s ease;}
@keyframes slideIn{from{transform:translateX(-100%);}to{transform:translateX(0);}}
.mobile-close{position:absolute;top:16px;right:16px;font-size:21px;cursor:pointer;}

/* PAGE */
.page{padding:26px;max-width:960px;}
.page-header{margin-bottom:24px;}
.page-header .eyebrow{font-size:11px;font-weight:700;letter-spacing:2.5px;color:var(--gold);text-transform:uppercase;margin-bottom:5px;}
.page-header h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:34px;line-height:1;}
.page-header p{font-size:14px;color:var(--gray);margin-top:5px;}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;transition:background 0.15s;}
.card:hover{background:rgba(255,255,255,0.06);}
.card-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;margin-bottom:3px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.stat-tile{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;border-top:3px solid var(--gold);}
.stat-tile .num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:34px;line-height:1;color:var(--gold);}
.stat-tile .label{font-size:11px;color:var(--gray);margin-top:2px;}
.progress-bar{height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;margin-top:8px;}
.progress-bar .fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width 0.6s ease;}

/* WORKOUT */
.week-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:18px;}
.week-tab{padding:6px 12px;border-radius:20px;cursor:pointer;font-size:11px;font-weight:600;background:rgba(255,255,255,0.06);color:var(--gray);border:1px solid rgba(255,255,255,0.08);transition:all 0.15s;}
.week-tab:hover{background:rgba(255,255,255,0.1);color:var(--white);}
.week-tab.active{background:var(--gold);color:var(--navy);border-color:var(--gold);}
.week-tab.completed{background:rgba(26,122,66,0.2);color:var(--green);border-color:var(--green);}
.week-tab.completed.active{background:var(--green);color:var(--white);}
.phase-badge{display:inline-block;padding:3px 9px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.phase-gpp{background:rgba(26,122,66,0.2);color:#4ade80;}
.phase-acc{background:rgba(27,79,138,0.3);color:#60a5fa;}
.phase-trans{background:rgba(90,42,122,0.3);color:#c084fc;}
.phase-real{background:rgba(192,80,32,0.3);color:#fb923c;}
.session-tabs{display:flex;gap:0;margin-bottom:18px;background:rgba(255,255,255,0.04);border-radius:var(--radius-sm);padding:3px;border:1px solid var(--border);}
.session-tab{flex:1;padding:8px;text-align:center;cursor:pointer;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:0.5px;color:var(--gray);transition:all 0.15s;}
.session-tab.active{background:var(--navy2);color:var(--white);box-shadow:0 1px 4px rgba(0,0,0,0.3);}
.exercise-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
.exercise-header{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;cursor:pointer;gap:10px;}
.exercise-header:hover{background:rgba(255,255,255,0.03);}
.ex-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;flex:1;}
.ex-target{font-size:11px;color:var(--gold);font-weight:600;background:rgba(201,162,39,0.1);padding:3px 8px;border-radius:3px;white-space:nowrap;}
.ex-chevron{font-size:13px;color:var(--gray);transition:transform 0.2s;}
.ex-chevron.open{transform:rotate(180deg);}
.exercise-body{padding:0 15px 14px;display:none;}
.exercise-body.open{display:block;}
.ex-cue{font-size:12px;color:var(--gray);margin-bottom:10px;padding:8px 11px;background:rgba(255,255,255,0.03);border-left:3px solid var(--gold);border-radius:0 4px 4px 0;}
.set-grid{display:grid;grid-template-columns:46px 1fr 1fr 76px;gap:5px;margin-bottom:5px;}
.set-grid .hcell{font-size:9px;font-weight:700;letter-spacing:1.5px;color:rgba(255,255,255,0.3);text-transform:uppercase;text-align:center;}
.set-grid input{padding:7px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:var(--white);font-family:'Barlow',sans-serif;font-size:13px;text-align:center;width:100%;transition:border-color 0.15s;}
.set-grid input:focus{outline:none;border-color:var(--gold);background:rgba(255,255,255,0.08);}
.set-label{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--gray);}
.rpe-sel{padding:7px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:var(--white);font-family:'Barlow',sans-serif;font-size:12px;width:100%;-webkit-appearance:none;}
.save-bar{position:sticky;bottom:0;padding:14px 0;background:linear-gradient(to top,var(--navy) 60%,transparent);}
.sess-notes textarea{width:100%;padding:9px 11px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius-sm);color:var(--white);font-family:'Barlow',sans-serif;font-size:13px;resize:vertical;min-height:65px;}
.sess-notes textarea:focus{outline:none;border-color:var(--gold);}
.sess-notes label{display:block;font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--gray);text-transform:uppercase;margin-bottom:5px;}

/* WELLBEING */
.wb-domain{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.domain-name{width:85px;font-size:12px;font-weight:600;color:var(--gray);flex-shrink:0;}
.rating-dots{display:flex;gap:5px;flex:1;}
.rating-dot{flex:1;height:34px;border-radius:6px;cursor:pointer;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--gray);transition:all 0.15s;}
.rating-dot:hover{background:rgba(255,255,255,0.12);}
.rating-dot.s1{background:#7f1d1d;border-color:#ef4444;color:#fff;}
.rating-dot.s2{background:#78350f;border-color:#f97316;color:#fff;}
.rating-dot.s3{background:#1e3a5f;border-color:#3b82f6;color:#fff;}
.rating-dot.s4{background:#14532d;border-color:#22c55e;color:#fff;}
.rating-dot.s5{background:#14532d;border-color:#4ade80;color:#4ade80;}
.flag-card{background:rgba(192,80,32,0.15);border:1px solid rgba(192,80,32,0.3);border-radius:var(--radius);padding:12px 15px;margin-top:14px;}
.flag-card .ft{font-size:13px;font-weight:700;color:var(--orange);margin-bottom:3px;}
.flag-card p{font-size:12px;color:rgba(255,255,255,0.7);}

/* TESTING */
.test-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.test-name-col{flex:1;}
.test-name{font-size:13px;}
.test-target{font-size:11px;color:var(--gray);}
.test-input{width:84px;padding:7px 9px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:var(--white);font-family:'Barlow',sans-serif;font-size:13px;text-align:center;}
.test-input:focus{outline:none;border-color:var(--gold);}
.test-unit{font-size:11px;color:var(--gray);}
.badge{font-size:10px;font-weight:700;padding:3px 7px;border-radius:3px;}
.bg{background:rgba(26,122,66,0.2);color:#4ade80;}
.bb{background:rgba(192,80,32,0.2);color:#fb923c;}
.bk{background:rgba(27,79,138,0.2);color:#60a5fa;}

/* COACH DASHBOARD */
.coach-badge{background:rgba(201,162,39,0.2);border:1px solid rgba(201,162,39,0.3);border-radius:var(--radius-sm);padding:6px 12px;font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--gold);display:inline-block;margin-bottom:16px;}
.student-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all 0.15s;}
.student-card:hover{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.15);}
.student-card .sname{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;margin-bottom:2px;}
.student-card .smeta{font-size:12px;color:var(--gray);margin-bottom:10px;}
.student-card .sstat{display:flex;gap:10px;}
.student-card .sstat-item{text-align:center;}
.student-card .sstat-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:var(--gold);}
.student-card .sstat-label{font-size:10px;color:var(--gray);}
.flag-dot{width:8px;height:8px;border-radius:50%;background:var(--orange);display:inline-block;margin-left:6px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.detail-modal{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);overflow-y:auto;}
.detail-modal.open{display:block;}
.detail-panel{background:#0e2236;border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius);max-width:720px;margin:40px auto;padding:28px;}
.detail-close{float:right;font-size:20px;cursor:pointer;color:var(--gray);}
.detail-close:hover{color:var(--white);}
.log-entry{padding:10px 12px;background:rgba(255,255,255,0.03);border-radius:var(--radius-sm);margin-bottom:6px;border-left:3px solid var(--green);}
.log-entry .le-title{font-size:13px;font-weight:600;}
.log-entry .le-meta{font-size:11px;color:var(--gray);margin-top:2px;}
.log-entry .le-rpe{float:right;font-size:12px;font-weight:700;color:var(--gold);}

/* MISC */
.section-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.45);margin:22px 0 10px;display:flex;align-items:center;gap:10px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.divider{height:1px;background:var(--border);margin:18px 0;}
.info-bar{background:rgba(27,79,138,0.15);border:1px solid rgba(27,79,138,0.2);border-left:3px solid var(--steel);border-radius:var(--radius-sm);padding:9px 13px;font-size:12px;color:rgba(255,255,255,0.7);margin-bottom:14px;}
.toast{position:fixed;bottom:22px;right:22px;z-index:999;background:var(--navy2);border:1px solid var(--green);color:var(--white);padding:11px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;transform:translateY(80px);opacity:0;transition:all 0.3s ease;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.error{border-color:var(--orange);}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty-state{text-align:center;padding:44px 22px;color:var(--gray);}
.empty-state .ei{font-size:38px;margin-bottom:10px;}
.session-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.session-row:last-child{border-bottom:none;}
.session-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
.session-info{flex:1;}
.session-info .sn{font-size:13px;font-weight:500;}
.session-info .sd{font-size:11px;color:var(--gray);}
.srpe{font-size:11px;font-weight:700;color:var(--gold);background:rgba(201,162,39,0.1);padding:2px 7px;border-radius:3px;}

/* MOTTO */
.motto-card{background:linear-gradient(135deg,rgba(90,42,122,0.2) 0%,rgba(13,33,55,0.4) 100%);border:1px solid rgba(90,42,122,0.2);border-radius:var(--radius);padding:18px;}
.motto-lbl{font-size:10px;font-weight:700;letter-spacing:2px;color:#c084fc;text-transform:uppercase;margin-bottom:6px;}
.motto-txt{font-size:16px;font-weight:500;color:var(--white);line-height:1.5;margin-bottom:5px;}
.motto-author{font-size:11px;color:var(--gray);}
.motto-theme{font-size:10px;font-weight:700;letter-spacing:2px;color:#c084fc;text-transform:uppercase;margin-top:6px;}

@media(max-width:768px){.sidebar{display:none;}.mobile-header{display:flex;}.page{padding:14px;}.grid-2{grid-template-columns:1fr;}.grid-3{grid-template-columns:1fr 1fr;}.grid-4{grid-template-columns:1fr 1fr;}.set-grid{grid-template-columns:42px 1fr 1fr 68px;gap:4px;}}
@media(max-width:480px){.grid-3{grid-template-columns:1fr;}.grid-4{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div id="app">

<!-- LOGIN -->
<div id="login" class="screen active">
  <div class="login-bg"></div><div class="login-grid"></div>
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-badge">BUNDABERG SHS</div>
      <div class="login-title">RL<br><span>ACADEMY</span></div>
      <div class="login-sub">Student Training Portal</div>
    </div>

    <!-- Sign In -->
    <div class="login-card" id="card-login">

function showCard(id){document.querySelectorAll('.login-card').forEach(c=>c.style.display='none');document.getElementById(id).style.display='block';}

async function doRegister(){
  const name=document.getElementById('rg-name').value.trim();
  const year=document.getElementById('rg-year').value;
  const pos=document.getElementById('rg-pos').value;
  const pin=document.getElementById('rg-pin').value.trim();
  if(!name||pin.length!==4||!/^\d{4}$/.test(pin)){toast('Enter your name and a 4-digit PIN',true);return;}
  setLoading('btn-reg',true);
  // Check if name taken
  const {data:existing}=await sb.from('profiles').select('id').ilike('name',name).eq('role','student');
  if(existing&&existing.length>0){toast('Name already taken — try a different name',true);setLoading('btn-reg',false);return;}
  const {data,error}=await sb.from('profiles').insert({name,pin,role:'student',year_level:year,position:pos}).select().single();
  setLoading('btn-reg',false);
  if(error){toast('Error creating account: '+error.message,true);return;}
  CU=data; loadApp();
}

async function doLogin(){
  const name=document.getElementById('li-name').value.trim();
  const pin=document.getElementById('li-pin').value.trim();
  if(!name||!pin){toast('Enter your name and PIN',true);return;}
  setLoading('btn-login',true);
  const {data,error}=await sb.from('profiles').select('*').ilike('name',name).eq('pin',pin).eq('role','student').single();
  setLoading('btn-login',false);
  if(error||!data){toast('Name or PIN incorrect',true);return;}
  CU=data; loadApp();
}

async function doCoachLogin(){
  const name=document.getElementById('co-name').value.trim();
  const pin=document.getElementById('co-pin').value.trim();
  if(!name){toast('Enter your coach name',true);return;}
  if(!pin){toast('Enter your PIN',true);return;}
  const btn=document.getElementById('btn-coach');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span> Signing in...';
  try {
    // First check the name exists at all
    const {data:nameCheck}=await sb.from('profiles').select('id,name,role,pin').ilike('name',name);
    console.log('Name check results:', nameCheck);
    if(!nameCheck||nameCheck.length===0){
      btn.disabled=false; btn.innerHTML='COACH SIGN IN';
      toast('Name not found. Check spelling exactly matches what was entered in the database.',true);
      return;
    }
    // Check role
    const coachRows=nameCheck.filter(r=>r.role==='coach');
    if(coachRows.length===0){
      btn.disabled=false; btn.innerHTML='COACH SIGN IN';
      toast('Account found but role is not coach. Check the database.',true);
      return;
    }
    // Check pin
    const match=coachRows.find(r=>r.pin===pin);
    if(!match){
      btn.disabled=false; btn.innerHTML='COACH SIGN IN';
      toast('PIN incorrect. Try again.',true);
      return;
    }
    // Full profile fetch
    const {data,error}=await sb.from('profiles').select('*').eq('id',match.id).single();
    btn.disabled=false; btn.innerHTML='COACH SIGN IN';
    if(error||!data){toast('Error loading profile: '+(error?.message||'unknown'),true);return;}
    CU=data; loadApp();
  } catch(e) {
    btn.disabled=false; btn.innerHTML='COACH SIGN IN';
    toast('Connection error: '+e.message,true);
    console.error('Coach login error:',e);
  }
}

function loadApp(){
  document.getElementById('login').classList.remove('active');

async function renderWorkouts(){
  const c=document.getElementById('content');
  c.innerHTML=`<div class="page"><div style="padding:40px;text-align:center"><div class="spinner"></div></div></div>`;
  // load logs for this student
  const {data:logs}=await sb.from('session_logs').select('week_number,session_day').eq('student_id',CU.id);
  const loggedSet=new Set((logs||[]).map(l=>`${l.week_number}_${l.session_day}`));
  const wk=WEEKS[CW-1];
  const phaseClass={GPP:'phase-gpp',ACC:'phase-acc',TRANS:'phase-trans',REAL:'phase-real'}[wk.phase];
  const sess=CS==='mon'?wk.mon:CS==='wed'?wk.wed:wk.fri;
  const logKey=`${CW}_${CS}`;
  const isLogged=loggedSet.has(logKey);
  // load existing log for this session
  const {data:existing}=await sb.from('session_logs').select('*').eq('student_id',CU.id).eq('week_number',CW).eq('session_day',CS).single();
  const savedExercises=(existing||{}).exercises||{};
  const savedNotes=(existing||{}).notes||'';
  TL={...savedExercises};

  const weekTabsHtml=WEEKS.map((w,i)=>{
    const hasAll=['mon','wed','fri'].every(s=>loggedSet.has(`${w.wk}_${s}`));
    return `<div class="week-tab${i+1===CW?' active':''}${hasAll?' completed':''}" onclick="setWeek(${w.wk})">${w.wk}</div>`;
  }).join('');
  const sessionTabsHtml=[{k:'mon',l:'Monday'},{k:'wed',l:'Wednesday'},{k:'fri',l:'Friday'}].map(s=>`<div class="session-tab${s.k===CS?' active':''}" onclick="setSess('${s.k}')">${s.l}</div>`).join('');
  const exHtml=sess.exercises.map((ex,ei)=>{
    const setRows=Array.from({length:ex.sets},(_,si)=>{
      const sv=(TL[ei]||{})[si]||{};
      return `<div class="set-grid">
        <div class="set-label">S${si+1}</div>
        <input type="number" placeholder="kg" value="${sv.weight||''}" inputmode="decimal" oninput="setField(${ei},${si},'weight',this.value)">
        <input type="number" placeholder="reps" value="${sv.reps||''}" inputmode="numeric" oninput="setField(${ei},${si},'reps',this.value)">
        <select class="rpe-sel" onchange="setField(${ei},${si},'rpe',this.value)">
          <option value="">RPE</option>${[6,7,7.5,8,8.5,9,9.5,10].map(r=>`<option value="${r}"${sv.rpe==r?' selected':''}>${r}</option>`).join('')}
        </select>
      </div>`;
    }).join('');
    return `<div class="exercise-card">
      <div class="exercise-header" onclick="toggleEx(${ei})">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-target">${ex.target}</div>
        <div class="ex-chevron" id="chev-${ei}">▾</div>
      </div>
      <div class="exercise-body" id="exb-${ei}">
        <div class="ex-cue">${ex.cue}</div>
        <div class="set-grid" style="margin-bottom:5px"><div class="set-label"></div><div class="hcell">Weight</div><div class="hcell">Reps</div><div class="hcell">RPE</div></div>
        ${setRows}
      </div>
    </div>`;
  }).join('');

  c.innerHTML=`<div class="page">
    <div class="page-header"><div class="eyebrow">Training Program</div><h1>Workouts</h1><p>9-week progressive program — log your sets, weights, and RPE every session.</p></div>
    <div class="info-bar">📍 <strong>Week ${CW} of 9</strong> — ${wk.label} · ${wk.theme}</div>
    <div class="week-tabs">${weekTabsHtml}</div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap">
      <span class="phase-badge ${phaseClass}">${wk.phase}</span>
      ${isLogged?'<span style="font-size:11px;color:var(--green);font-weight:700">✓ Session logged</span>':''}
    </div>
    <div class="session-tabs">${sessionTabsHtml}</div>
    <div class="card" style="margin-bottom:10px;padding:12px 15px">
      <div style="font-size:11px;color:var(--gray);margin-bottom:1px">${sess.title}</div>
      <div style="font-size:13px;font-weight:600;color:var(--gold)">${sess.focus}</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.5);margin-top:1px">Intensity: <strong style="color:var(--white)">${sess.intensity}</strong></div>
    </div>
    ${exHtml}
    <div class="sess-notes" style="margin-bottom:10px"><label>Session Notes</label><textarea id="sess-note" placeholder="How did it feel? Personal bests? Anything to flag?">${savedNotes}</textarea></div>
    <div class="save-bar"><button class="btn btn-green" id="btn-save-sess" onclick="saveSession()">${isLogged?'✓ UPDATE LOG':'✓ MARK SESSION COMPLETE'}</button></div>
  </div>`;
}

function setField(ei,si,field,val){if(!TL[ei])TL[ei]={};if(!TL[ei][si])TL[ei][si]={};TL[ei][si][field]=val;}
function toggleEx(ei){document.getElementById(`exb-${ei}`).classList.toggle('open');document.getElementById(`chev-${ei}`).classList.toggle('open');}
function setWeek(w){CW=w;TL={};renderWorkouts();}
function setSess(s){CS=s;TL={};renderWorkouts();}

async function saveSession(){
  setLoading('btn-save-sess',true);
  const notes=document.getElementById('sess-note')?.value||'';
  let rpeSum=0,rpeCount=0;
  Object.values(TL).forEach(sets=>Object.values(sets).forEach(s=>{if(s.rpe){rpeSum+=parseFloat(s.rpe);rpeCount++;}}));
  const avgRpe=rpeCount>0?Math.round(rpeSum/rpeCount*10)/10:null;
  // upsert
  const {error}=await sb.from('session_logs').upsert({
    student_id:CU.id, week_number:CW, session_day:CS,
    exercises:TL, notes, avg_rpe:avgRpe, logged_at:new Date().toISOString()
  },{onConflict:'student_id,week_number,session_day'});
  setLoading('btn-save-sess',false);
  if(error){toast('Error saving: '+error.message,true);return;}
  toast('Session saved ✓');
  TL={};renderWorkouts();
}

async function renderTesting(){
  const c=document.getElementById('content');
  c.innerHTML=`<div class="page"><div style="padding:40px;text-align:center"><div class="spinner"></div></div></div>`;
  const {data:rows}=await sb.from('testing').select('*').eq('student_id',CU.id);
  const byPeriod={};(rows||[]).forEach(r=>byPeriod[r.period]=r);
  const periods=[{id:'pre',label:'Pre-Term (Week 1)'},{id:'mid',label:'Mid-Term (Week 5)'},{id:'end',label:'End-Term (Week 9)'}];
  const html=periods.map(p=>{
    const saved=byPeriod[p.id]||{};
    const testRows=TESTS_DEF.map(t=>`<div class="test-row">
      <div class="test-name-col"><div class="test-name">${t.name}</div><div class="test-target">Target: ${t.target}</div></div>
      <div style="display:flex;gap:6px;align-items:center">
        <input type="number" class="test-input" value="${saved[t.id]||''}" inputmode="decimal" placeholder="—"
          onchange="saveTestField('${p.id}','${t.id}',this.value)" data-period="${p.id}" data-test="${t.id}">
        <span class="test-unit">${t.unit}</span>
      </div>
    </div>`).join('');
    return `<div style="margin-bottom:22px"><div class="section-title">${p.label}</div>${testRows}<button class="btn btn-ghost btn-sm" style="margin-top:10px" onclick="saveTestPeriod('${p.id}')">Save ${p.label} Results</button></div>`;
  }).join('');
  // Progress comparison
  const pre=byPeriod.pre||{}; const end=byPeriod.end||{};
  const compRows=TESTS_DEF.map(t=>{
    if(!pre[t.id]||!end[t.id])return '';
    const diff=t.low?pre[t.id]-end[t.id]:end[t.id]-pre[t.id];
    const improved=diff>0;
    return `<div class="test-row"><div class="test-name-col"><div class="test-name">${t.name}</div></div><div style="display:flex;gap:10px;align-items:center"><span style="font-size:12px;color:var(--gray)">${pre[t.id]}${t.unit}</span><span style="color:var(--gray)">→</span><span style="font-size:13px;font-weight:700">${end[t.id]}${t.unit}</span><span class="badge ${improved?'bg':'bb'}">${improved?'▲':'▼'}${Math.abs(Math.round((end[t.id]-pre[t.id])*100)/100)}</span></div></div>`;
  }).filter(Boolean).join('');
  c.innerHTML=`<div class="page">
    <div class="page-header"><div class="eyebrow">Performance Data</div><h1>My Testing</h1><p>Record test results at start, middle, and end of term. Track your progress.</p></div>
    <div class="info-bar">💡 Enter results after each testing session. Your coach can also see these results.</div>
    ${html}
    ${compRows?`<div class="section-title">Progress (Pre vs End)</div><div class="card">${compRows}</div>`:''}
  </div>`;
}

let testTemp={};
function saveTestField(period,testId,val){if(!testTemp[period])testTemp[period]={};testTemp[period][testId]=parseFloat(val)||null;}
async function saveTestPeriod(period){
  if(!testTemp[period]||Object.keys(testTemp[period]).length===0){toast('Enter at least one result first',true);return;}
  const payload={student_id:CU.id,period,...testTemp[period],tested_at:new Date().toISOString()};
  const {error}=await sb.from('testing').upsert(payload,{onConflict:'student_id,period'});
  if(error){toast('Error: '+error.message,true);return;}
  toast(`${period.toUpperCase()} results saved ✓`);
}

async function loadCoachDash(){
  const [studentsR,logsR,wellR,flagsR]=await Promise.all([
    sb.from('profiles').select('*').eq('role','student').order('name'),
    sb.from('session_logs').select('student_id,week_number,session_day,avg_rpe,logged_at').order('logged_at',{ascending:false}),
    sb.from('wellbeing').select('*').order('checked_at',{ascending:false}),
    sb.from('wellbeing').select('student_id,sleep,energy,mood,soreness,stress').lt('sleep',3).or('energy.lt.3,mood.lt.3,soreness.lt.3,stress.lt.3'),
  ]);
  const students=studentsR.data||[];
  const logs=logsR.data||[];
  const well=wellR.data||[];
  const totalSessions=logs.length;
  const avgRpe=logs.filter(l=>l.avg_rpe).reduce((s,l,i,a)=>s+l.avg_rpe/a.length,0);
  const thisWeekLogs=logs.filter(l=>new Date(l.logged_at)>new Date(Date.now()-7*24*60*60*1000));
  const flagStudentIds=new Set((flagsR.data||[]).map(f=>f.student_id));

  // Per-student summary
  const studentsHtml=students.map(s=>{
    const sLogs=logs.filter(l=>l.student_id===s.id);
    const sWell=well.filter(w=>w.student_id===s.id);
    const lastLog=sLogs[0];
    const lastDate=lastLog?new Date(lastLog.logged_at).toLocaleDateString('en-AU',{day:'numeric',month:'short'}):'Never';
    const isFlagged=flagStudentIds.has(s.id);
    const avgWell=sWell.length>0?(sWell.slice(0,4).reduce((sum,w)=>{const dom=['sleep','energy','mood','soreness','stress'];return sum+dom.reduce((s2,d)=>s2+(w[d]||0),0)/5;},0)/Math.min(sWell.length,4)).toFixed(1):'—';
    return`<div class="student-card" onclick="openStudentDetail('${s.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div class="sname">${s.name}${isFlagged?'<span class="flag-dot"></span>':''}</div>
        <div style="font-size:11px;color:var(--gray)">Last: ${lastDate}</div>
      </div>
      <div class="smeta">${s.position} · ${s.year_level}</div>
      <div class="sstat">
        <div class="sstat-item"><div class="sstat-num">${sLogs.length}</div><div class="sstat-label">Sessions</div></div>
        <div class="sstat-item"><div class="sstat-num" style="color:${avgWell!=='—'&&parseFloat(avgWell)<3?'var(--orange)':'var(--gold)'}">${avgWell}</div><div class="sstat-label">Avg Wellbeing</div></div>
        <div class="sstat-item"><div class="sstat-num" style="color:var(--steel)">${sLogs.filter(l=>l.avg_rpe).length>0?(sLogs.filter(l=>l.avg_rpe).reduce((s,l)=>s+l.avg_rpe,0)/sLogs.filter(l=>l.avg_rpe).length).toFixed(1):'—'}</div><div class="sstat-label">Avg RPE</div></div>
      </div>
      <div class="progress-bar" style="margin-top:10px"><div class="fill" style="width:${Math.round(sLogs.length/27*100)}%"></div></div>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML=`<div class="page">
    <div class="coach-badge">⚡ COACH DASHBOARD</div>
    <div class="page-header"><h1>Squad Overview</h1><p>All student data in real time. Click a student to see full details.</p></div>
    <div class="grid-4" style="margin-bottom:20px">
      <div class="stat-tile"><div class="num">${students.length}</div><div class="label">Students</div></div>
      <div class="stat-tile" style="border-top-color:var(--green)"><div class="num" style="color:var(--green)">${totalSessions}</div><div class="label">Total Sessions</div></div>
      <div class="stat-tile" style="border-top-color:var(--steel)"><div class="num" style="color:var(--steel)">${thisWeekLogs.length}</div><div class="label">This Week</div></div>
      <div class="stat-tile" style="border-top-color:var(--orange)"><div class="num" style="color:var(--orange)">${flagStudentIds.size}</div><div class="label">Wellbeing Flags</div></div>
    </div>
    ${flagStudentIds.size>0?`<div class="flag-card" style="margin-bottom:18px"><div class="ft">⚠️ ${flagStudentIds.size} student${flagStudentIds.size>1?'s':''} flagged for low wellbeing</div><p>Students with ● next to their name have scored below threshold. Review their wellbeing check-in and follow up before their next session.</p></div>`:''}
    <div class="section-title">All Students</div>
    <div class="grid-2">${studentsHtml}</div>
  </div>`;
}

  c.innerHTML=`<div class="page"><div class="coach-badge">⚡ COACH</div><div class="page-header"><h1>All Students</h1></div><div style="padding:40px;text-align:center"><div class="spinner"></div></div></div>`;
  const {data:students}=await sb.from('profiles').select('*').eq('role','student').order('name');
  const {data:logs}=await sb.from('session_logs').select('student_id,logged_at').order('logged_at',{ascending:false});
  const lastLogMap={};(logs||[]).forEach(l=>{if(!lastLogMap[l.student_id])lastLogMap[l.student_id]=l.logged_at;});
  const countMap={};(logs||[]).forEach(l=>countMap[l.student_id]=(countMap[l.student_id]||0)+1);
  const rows=(students||[]).map(s=>`<tr style="border-bottom:1px solid var(--border)">
    <td style="padding:10px 12px;font-weight:600">${s.name}</td>
    <td style="padding:10px 12px;color:var(--gray)">${s.position}</td>
    <td style="padding:10px 12px;color:var(--gray)">${s.year_level}</td>
    <td style="padding:10px 12px;text-align:center"><span style="color:var(--gold);font-weight:700">${countMap[s.id]||0}</span></td>
    <td style="padding:10px 12px;color:var(--gray);font-size:12px">${lastLogMap[s.id]?new Date(lastLogMap[s.id]).toLocaleDateString('en-AU',{day:'numeric',month:'short'}):'Never'}</td>
    <td style="padding:10px 12px"><button class="btn btn-ghost btn-sm" onclick="openStudentDetail('${s.id}')">View</button></td>
  </tr>`).join('');
  document.getElementById('content').innerHTML=`<div class="page">
    <div class="coach-badge">⚡ COACH</div>
    <div class="page-header"><h1>All Students</h1><p>${(students||[]).length} registered students</p></div>
    <div class="card" style="padding:0;overflow:hidden">
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="background:rgba(255,255,255,0.04)">${['Name','Position','Year','Sessions','Last Login',''].map(h=>`<th style="padding:10px 12px;text-align:left;font-size:10px;letter-spacing:1.5px;color:var(--gray);font-weight:700;text-transform:uppercase">${h}</th>`).join('')}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

async function renderFlags(){
  const c=document.getElementById('content');
  c.innerHTML=`<div class="page"><div class="coach-badge">🚨 WELLBEING FLAGS</div><div class="page-header"><h1>Wellbeing Flags</h1></div><div style="padding:40px;text-align:center"><div class="spinner"></div></div></div>`;
  const {data:well}=await sb.from('wellbeing').select('*,profiles(name,position,year_level)').order('checked_at',{ascending:false});
  const flagged=(well||[]).filter(w=>{const low=['sleep','energy','mood','soreness','stress'].filter(d=>(w[d]||0)>0&&(w[d]||0)<=2);return low.length>=2;});
  const flagHtml=flagged.length?flagged.map(w=>{const low=['sleep','energy','mood','soreness','stress'].filter(d=>(w[d]||0)>0&&(w[d]||0)<=2);const name=w.profiles?.name||'Unknown';return`<div style="background:rgba(192,80,32,0.1);border:1px solid rgba(192,80,32,0.25);border-left:4px solid var(--orange);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px">${name} <span style="font-size:12px;color:var(--gray);font-family:'Barlow',sans-serif;font-weight:400">· Week ${w.week_number}</span></div>
        <div style="font-size:11px;color:var(--gray)">${new Date(w.checked_at).toLocaleDateString('en-AU',{day:'numeric',month:'short'})}</div>
      </div>
      <div style="font-size:13px;color:var(--orange);font-weight:600">Low scores: ${low.join(', ')}</div>
      <div style="font-size:12px;color:var(--gray);margin-top:4px">${['sleep','energy','mood','soreness','stress'].map(d=>`${d}: ${w[d]||'—'}`).join(' · ')}</div>
    </div>`;}).join(''):`<div class="empty-state"><div class="ei">✅</div><p>No wellbeing flags this week.<br>All students are tracking well.</p></div>`;
  document.getElementById('content').innerHTML=`<div class="page">
    <div class="coach-badge">🚨 WELLBEING FLAGS</div>
    <div class="page-header"><h1>Wellbeing Flags</h1><p>Students scoring ≤2 on 2+ domains. Follow up before their next session.</p></div>
    ${flagged.length?`<div class="flag-card" style="margin-bottom:16px"><div class="ft">${flagged.length} flagged check-in${flagged.length>1?'s':''} require follow-up</div><p>Contact these students directly or speak with them before training.</p></div>`:''}
    ${flagHtml}
  </div>`;
}

async function renderCoachLogs(){
  const c=document.getElementById('content');
  c.innerHTML=`<div class="page"><div class="coach-badge">📅 SESSION LOGS</div><div class="page-header"><h1>Session Logs</h1></div><div style="padding:40px;text-align:center"><div class="spinner"></div></div></div>`;
  const {data:logs}=await sb.from('session_logs').select('*,profiles(name,position)').order('logged_at',{ascending:false}).limit(100);
  const rows=(logs||[]).map(l=>{const sessLabel={mon:'Mon S&C',wed:'Wed S&C',fri:'Fri S&C'}[l.session_day]||l.session_day;return`<tr style="border-bottom:1px solid var(--border)">
    <td style="padding:9px 12px;font-weight:600">${l.profiles?.name||'—'}</td>
    <td style="padding:9px 12px;color:var(--gray)">${l.profiles?.position||'—'}</td>
    <td style="padding:9px 12px">Wk ${l.week_number} — ${sessLabel}</td>
    <td style="padding:9px 12px;text-align:center">${l.avg_rpe?`<span class="srpe">RPE ${l.avg_rpe}</span>`:'—'}</td>
    <td style="padding:9px 12px;color:var(--gray);font-size:12px">${new Date(l.logged_at).toLocaleDateString('en-AU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</td>
    <td style="padding:9px 12px;font-size:12px;color:var(--gray);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.notes||''}</td>
  </tr>`;}).join('');
  document.getElementById('content').innerHTML=`<div class="page">
    <div class="coach-badge">📅 SESSION LOGS</div>
    <div class="page-header"><h1>All Session Logs</h1><p>Last 100 sessions logged by students</p></div>
    <div class="card" style="padding:0;overflow:hidden;overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;min-width:600px">
        <thead><tr style="background:rgba(255,255,255,0.04)">${['Student','Position','Session','RPE','Date','Notes'].map(h=>`<th style="padding:9px 12px;text-align:left;font-size:10px;letter-spacing:1.5px;color:var(--gray);font-weight:700;text-transform:uppercase">${h}</th>`).join('')}</tr></thead>
        <tbody>${rows||'<tr><td colspan="6" style="padding:40px;text-align:center;color:var(--gray)">No sessions logged yet</td></tr>'}</tbody>
      </table>
    </div>
  </div>`;
}

async function renderCoachTesting(){
  const c=document.getElementById('content');
  c.innerHTML=`<div class="page"><div class="coach-badge">⚡ TESTING</div><div class="page-header"><h1>Testing Results</h1></div><div style="padding:40px;text-align:center"><div class="spinner"></div></div></div>`;
  const {data:tests}=await sb.from('testing').select('*,profiles(name,position,year_level)').order('tested_at',{ascending:false});
  const rows=(tests||[]).map(t=>`<tr style="border-bottom:1px solid var(--border)">
    <td style="padding:9px 12px;font-weight:600">${t.profiles?.name||'—'}</td>
    <td style="padding:9px 12px;color:var(--gray)">${t.profiles?.position||'—'}</td>
    <td style="padding:9px 12px"><span class="badge ${t.period==='end'?'bg':t.period==='mid'?'bk':'bb'}">${t.period.toUpperCase()}</span></td>
    ${TESTS_DEF.map(d=>`<td style="padding:9px 12px;text-align:center;font-size:13px">${t[d.id]||'—'}</td>`).join('')}
  </tr>`).join('');
  document.getElementById('content').innerHTML=`<div class="page">
    <div class="coach-badge">⚡ TESTING</div>
    <div class="page-header"><h1>Testing Results</h1><p>All student testing data</p></div>
    <div class="card" style="padding:0;overflow:hidden;overflow-x:auto">
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="background:rgba(255,255,255,0.04)">${['Student','Pos','Period',...TESTS_DEF.map(d=>d.name)].map(h=>`<th style="padding:8px 10px;text-align:center;font-size:9px;letter-spacing:1px;color:var(--gray);font-weight:700;text-transform:uppercase;white-space:nowrap">${h}</th>`).join('')}</tr></thead>
        <tbody>${rows||'<tr><td colspan="12" style="padding:40px;text-align:center;color:var(--gray)">No test results yet</td></tr>'}</tbody>
      </table>
    </div>
  </div>`;
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function toast(msg,error=false){const t=document.getElementById('toast');t.textContent=(error?'✕ ':'✓ ')+msg;t.className='toast show'+(error?' error':'');setTimeout(()=>t.classList.remove('show'),3000);}
function setLoading(id,on){const b=document.getElementById(id);if(!b)return;if(on&&!b.dataset.orig)b.dataset.orig=b.innerHTML;b.disabled=on;b.innerHTML=on?`<span class="spinner"></span> Please wait...`:b.dataset.orig;}
function toggleMenu(){document.getElementById('mob-menu').classList.toggle('open');}
function closeMenuOutside(e){if(!e.target.closest('.mobile-menu-panel'))document.getElementById('mob-menu').classList.remove('open');}

// ── Boot ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('li-pin').addEventListener('keyup',e=>{if(e.key==='Enter')doLogin();});
  document.getElementById('li-name').addEventListener('keyup',e=>{if(e.key==='Enter')document.getElementById('li-pin').focus();});
});
</script>
